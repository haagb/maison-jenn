<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FBFAF7">
<title>Maison Jenn</title>
<script type="text/javascript" nonce="fd3455cd015641e980821b38fcb" src="//local.adguard.org?ts=1779953154404&amp;type=content-script&amp;dmn=claude.ai&amp;url=https%3A%2F%2Fclaude.ai%2Fdesign%2Fv1%2Fdesign%2Fprojects%2F75c9dcce-b5c9-4b92-b39e-ab182eef6a40%2Fdownload%3Fpath%3DMaison%2520Jenn.html&amp;app=company.thebrowser.dia&amp;css=2&amp;js=1&amp;rel=1&amp;rji=1&amp;sbe=1"></script><script type="text/javascript" nonce="fd3455cd015641e980821b38fcb" src="//local.adguard.org?ts=1779953154404&amp;name=AdGuard%20Extra&amp;type=user-script"></script><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;0,6..96,600;0,6..96,700;1,6..96,400;1,6..96,500;1,6..96,700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBFAF7;
  --ink:#141312;
  --ink-soft:#6B6864;
  --ink-faint:#A8A39B;
  --hair:#1B1A18;
  --hair-soft:rgba(20,19,18,0.14);
  --tint-warm:#FBFAF7;
  --tint-cool:#FBFAF7;
  --accent:#141312;
}
html[data-mode="night"]{
  --paper:#0E0E0D;
  --ink:#F4F1EB;
  --ink-soft:#A8A39B;
  --ink-faint:#6B6864;
  --hair:#F4F1EB;
  --hair-soft:rgba(244,241,235,0.16);
  --accent:#F4F1EB;
}
html[data-tint="warm"]{ --paper:#FBF7F0; }
html[data-tint="cool"]{ --paper:#F6F8FA; }
html[data-mode="night"][data-tint="warm"]{ --paper:#13110D; }
html[data-mode="night"][data-tint="cool"]{ --paper:#0C0E10; }

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  font-weight:400;
  font-size:14px;
  line-height:1.45;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  transition:background-color 700ms cubic-bezier(.22,.61,.36,1), color 400ms ease;
  overflow-x:hidden;
}
.app{
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  position:relative;
  padding-bottom:48px;
}

/* ——— utility ——— */
.serif{font-family:'Bodoni Moda',Georgia,serif;font-feature-settings:'liga' 1,'kern' 1;}
.italic{font-style:italic}
.mono{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace}
.eyebrow{
  font-size:9.5px;letter-spacing:0.28em;text-transform:uppercase;
  color:var(--ink-soft);font-weight:500;
}
.hair{height:1px;background:var(--hair);opacity:0.85}
.hair-soft{height:1px;background:var(--hair-soft)}

/* ——— top bar ——— */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 22px 0;
}
.iconbtn{
  width:34px;height:34px;display:grid;place-items:center;
  background:transparent;border:none;cursor:pointer;color:var(--ink);
  border-radius:50%;
}
.iconbtn:active{background:var(--hair-soft)}
.iconbtn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1}
.topbar .stamp{
  font-size:9.5px;letter-spacing:0.32em;text-transform:uppercase;color:var(--ink-soft);
}

/* ——— masthead ——— */
.mast{
  padding:22px 22px 4px;text-align:center;position:relative;
}
.mast-meta{
  display:flex;align-items:center;justify-content:center;gap:14px;
  margin:8px 0 18px;
}
.mast-meta .line{flex:0 0 38px;height:1px;background:var(--hair);opacity:0.6}
.greet{
  font-family:'Bodoni Moda',serif;font-style:italic;font-weight:400;
  font-size:13.5px;color:var(--ink-soft);
}
.wordmark{
  font-family:'Bodoni Moda',serif;
  font-weight:500;
  color:var(--ink);
  line-height:0.86;
  letter-spacing:-0.02em;
}
.wm-1{font-size:78px;font-weight:500;}
.wm-2{font-size:78px;font-style:italic;font-weight:400;margin-top:-2px;}
.mast-foot{
  display:flex;align-items:center;justify-content:center;gap:14px;
  margin-top:18px;
}
.mast-foot .dot{width:3px;height:3px;border-radius:50%;background:var(--ink-soft)}
.mast-foot .l,.mast-foot .r{
  font-size:9.5px;letter-spacing:0.28em;text-transform:uppercase;color:var(--ink-soft);
}

/* ——— categories ——— */
.cats-wrap{margin:24px 0 0}
.cats{
  display:flex;justify-content:center;gap:0;padding:14px 16px;
  overflow-x:auto;scrollbar-width:none;
}
.cats::-webkit-scrollbar{display:none}
.tb{
  flex:0 0 auto;background:transparent;border:none;cursor:pointer;
  padding:6px 14px;
  font-size:10.5px;letter-spacing:0.24em;text-transform:uppercase;
  color:var(--ink-faint);font-weight:500;
  position:relative;
  transition:color 200ms ease;
}
.tb.on{color:var(--ink)}
.tb.on::after{
  content:"";position:absolute;left:50%;bottom:-3px;transform:translateX(-50%);
  width:18px;height:1px;background:var(--ink);
}

/* ——— grid ——— */
.grid{
  display:grid;grid-template-columns:1fr 1fr;
  margin:0 22px;
  border-top:1px solid var(--hair);
  border-left:1px solid var(--hair);
}
.card{
  border-right:1px solid var(--hair);
  border-bottom:1px solid var(--hair);
  padding:26px 14px 22px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  cursor:pointer;background:transparent;
  position:relative;
  transition:background-color 180ms ease;
}
.card:active{background:var(--hair-soft)}
.card .num{
  position:absolute;top:8px;left:10px;
  font-family:'JetBrains Mono',monospace;
  font-size:9px;color:var(--ink-faint);letter-spacing:0.06em;
}
.card .temp{
  position:absolute;top:8px;right:10px;
  font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-faint);
}
.ill{width:58px;height:58px;color:var(--ink);display:grid;place-items:center}
.ill svg{width:100%;height:100%;stroke:currentColor;fill:none;stroke-width:0.9;stroke-linecap:round;stroke-linejoin:round}
.cname{
  font-family:'Bodoni Moda',serif;font-style:italic;font-weight:400;
  font-size:17px;letter-spacing:-0.005em;color:var(--ink);text-align:center;
  line-height:1.1;
}
.ccal{
  font-family:'JetBrains Mono',monospace;
  font-size:9.5px;color:var(--ink-faint);letter-spacing:0.03em;
}

/* ——— star button ——— */
.star{
  position:absolute;top:8px;right:10px;
  width:24px;height:24px;display:grid;place-items:center;
  background:transparent;border:none;cursor:pointer;
  color:var(--ink-faint);
  transition:color 200ms ease, transform 200ms ease;
  z-index:2;
}
.star:active{transform:scale(0.85)}
.star svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.2;stroke-linejoin:round}
.star.on{color:var(--ink)}
.star.on svg{fill:currentColor}
.dstar{
  width:34px;height:34px;display:grid;place-items:center;
  background:transparent;border:none;cursor:pointer;color:var(--ink-soft);
  transition:color 200ms ease, transform 200ms ease;
}
.dstar:active{transform:scale(0.88)}
.dstar svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.1;stroke-linejoin:round}
.dstar.on{color:var(--ink)}
.dstar.on svg{fill:currentColor}

/* ——— favorites rail ——— */
.fav-section{padding:18px 0 4px}
.fav-head{
  display:flex;align-items:center;justify-content:center;gap:12px;
  padding:0 22px 14px;
}
.fav-head .line{flex:1;height:1px;background:var(--hair-soft)}
.fav-head .t{
  font-size:9.5px;letter-spacing:0.32em;text-transform:uppercase;color:var(--ink-soft);font-weight:500;
  display:flex;align-items:center;gap:8px;
}
.fav-head .t svg{width:10px;height:10px;stroke:currentColor;fill:currentColor;stroke-width:0.8}
.fav-rail{
  display:flex;gap:0;padding:0 22px 6px;
  overflow-x:auto;scrollbar-width:none;
  scroll-snap-type:x mandatory;
}
.fav-rail::-webkit-scrollbar{display:none}
.fav-card{
  flex:0 0 auto;width:138px;
  border:1px solid var(--hair);
  padding:18px 12px 14px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  cursor:pointer;background:transparent;
  scroll-snap-align:start;
  position:relative;
}
.fav-card + .fav-card{border-left:none}
.fav-card:active{background:var(--hair-soft)}
.fav-card .ill{width:42px;height:42px}
.fav-card .cname{font-size:14px}
.fav-card .ccal{font-size:8.5px}
.fav-card .fav-mark{
  position:absolute;top:7px;right:8px;
  font-size:11px;color:var(--ink);
}
.fav-card .fav-mark svg{width:9px;height:9px;fill:currentColor;stroke:currentColor;stroke-width:0.8}

.opt-sublabel{
  font-size:9px;letter-spacing:0.32em;text-transform:uppercase;color:var(--ink-soft);
  text-align:center;margin-bottom:10px;font-weight:500;
}
.opt-stack + .opt-stack{margin-top:22px}

.notes-wrap{margin-top:28px}
.notes-input{
  width:100%;border:1px solid var(--hair);background:transparent;
  padding:14px 16px;
  font-family:'Bodoni Moda',serif;font-style:italic;font-weight:400;
  font-size:15px;color:var(--ink);resize:none;min-height:72px;
  outline:none;line-height:1.5;
  transition:border-color 200ms ease, background-color 700ms ease, color 400ms ease;
}
.notes-input::placeholder{color:var(--ink-faint);font-style:italic}
.notes-input:focus{border-color:var(--ink)}

.dprep{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;color:var(--ink-faint);letter-spacing:0.04em;
  text-align:center;margin-top:6px;
}
.sent-prep{
  margin-top:14px;
  font-size:9.5px;letter-spacing:0.32em;text-transform:uppercase;color:var(--ink-faint);
}

.hist-row{
  display:grid;grid-template-columns:1fr auto;gap:14px;align-items:start;
  padding:16px 0;border-top:1px solid var(--hair-soft);
}
.hist-actions{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.hist-notes{
  font-family:'Bodoni Moda',serif;font-style:italic;font-size:12px;color:var(--ink-faint);
  margin-top:4px;line-height:1.4;
}
.hist-reorder{
  background:transparent;border:1px solid var(--hair);cursor:pointer;
  font-size:9px;letter-spacing:0.28em;text-transform:uppercase;color:var(--ink);font-weight:500;
  padding:7px 10px;
  font-family:'Inter',sans-serif;
}
.hist-reorder:active{background:var(--hair-soft)}

/* ——— footer note ——— */
.foot{
  padding:34px 22px 8px;text-align:center;
  font-size:9.5px;letter-spacing:0.28em;text-transform:uppercase;color:var(--ink-faint);
}
.foot .sig{
  font-family:'Bodoni Moda',serif;font-style:italic;font-size:14px;color:var(--ink-soft);
  letter-spacing:0;text-transform:none;margin-top:6px;
}

/* ——— detail (expand in place) ——— */
.detail{
  position:fixed;inset:0;background:var(--paper);
  z-index:30;display:flex;flex-direction:column;
  opacity:0;pointer-events:none;
  transform:translateY(8px) scale(0.98);
  transform-origin:var(--ox,50%) var(--oy,50%);
  transition:opacity 320ms cubic-bezier(.22,.61,.36,1), transform 420ms cubic-bezier(.22,.61,.36,1), background-color 700ms ease;
  overflow-y:auto;
}
.detail.on{opacity:1;pointer-events:auto;transform:translateY(0) scale(1)}
.detail-inner{
  max-width:430px;width:100%;margin:0 auto;padding:14px 26px 40px;min-height:100%;
  display:flex;flex-direction:column;
}
.dtop{display:flex;align-items:center;justify-content:space-between;padding:0 0 4px}
.dback{
  background:transparent;border:none;cursor:pointer;color:var(--ink);
  display:flex;align-items:center;gap:8px;padding:6px 0;
  font-size:10.5px;letter-spacing:0.24em;text-transform:uppercase;font-weight:500;
}
.dback svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.2}
.dnum{
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-faint);letter-spacing:0.06em;
}
.dhero{
  text-align:center;padding:40px 8px 12px;
}
.dhero .ill{width:120px;height:120px;margin:0 auto 24px}
.deye{
  font-size:9.5px;letter-spacing:0.32em;text-transform:uppercase;color:var(--ink-soft);
  margin-bottom:14px;
}
.dname{
  font-family:'Bodoni Moda',serif;font-style:italic;font-weight:400;
  font-size:46px;letter-spacing:-0.01em;line-height:0.95;color:var(--ink);
}
.dmeta{
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-top:14px;
}
.dmeta .line{flex:0 0 22px;height:1px;background:var(--hair-soft)}
.dmeta .t{
  font-size:9.5px;letter-spacing:0.28em;text-transform:uppercase;color:var(--ink-soft);
}
.ddesc{
  font-family:'Bodoni Moda',serif;font-weight:400;
  font-size:15px;line-height:1.6;color:var(--ink-soft);
  text-align:center;max-width:300px;margin:22px auto 0;
  text-wrap:pretty;
}
.dcal{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;color:var(--ink-faint);letter-spacing:0.04em;
  text-align:center;margin-top:14px;
}

.dopts{margin-top:36px}
.opt-label{
  display:flex;align-items:center;gap:12px;justify-content:center;
  margin-bottom:14px;
}
.opt-label .line{flex:0 0 22px;height:1px;background:var(--hair-soft)}
.opt-label .t{
  font-size:9.5px;letter-spacing:0.3em;text-transform:uppercase;color:var(--ink-soft);
}
.size-row{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--hair)}
.sz-half{
  padding:18px 0;background:transparent;border:none;cursor:pointer;
  font-family:'Bodoni Moda',serif;font-style:italic;font-size:18px;color:var(--ink-soft);
  letter-spacing:-0.005em;
  position:relative;
  transition:color 180ms ease, background-color 200ms ease;
}
.sz-half + .sz-half{border-left:1px solid var(--hair)}
.sz-half .sub{
  display:block;font-family:'JetBrains Mono',monospace;font-style:normal;
  font-size:9px;color:var(--ink-faint);letter-spacing:0.06em;margin-top:4px;
}
.sz-half.on{background:var(--ink);color:var(--paper)}
.sz-half.on .sub{color:var(--paper);opacity:0.6}
.opt-col{display:flex;flex-direction:column;border:1px solid var(--hair)}
.sz{
  padding:16px 0;background:transparent;border:none;cursor:pointer;
  font-family:'Bodoni Moda',serif;font-style:italic;font-size:18px;color:var(--ink-soft);
  transition:color 180ms ease, background-color 200ms ease;
}
.sz + .sz{border-top:1px solid var(--hair)}
.sz.on{background:var(--ink);color:var(--paper)}

.order-btn{
  margin-top:32px;width:100%;
  padding:18px 0;background:var(--ink);color:var(--paper);
  border:none;cursor:pointer;
  font-size:11px;letter-spacing:0.32em;text-transform:uppercase;font-weight:500;
  font-family:'Inter',sans-serif;
  transition:opacity 200ms ease, background-color 400ms ease, color 400ms ease;
}
.order-btn:disabled{opacity:0.25;cursor:default}

.disclaim{
  text-align:center;margin-top:18px;
  font-family:'Bodoni Moda',serif;font-style:italic;font-size:12px;color:var(--ink-faint);
}

/* ——— sent ——— */
.sent{
  position:fixed;inset:0;background:var(--paper);
  z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 32px;text-align:center;
  opacity:0;pointer-events:none;
  transform:scale(1.02);
  transition:opacity 420ms ease, transform 520ms cubic-bezier(.22,.61,.36,1), background-color 700ms ease;
}
.sent.on{opacity:1;pointer-events:auto;transform:scale(1)}
.sent-eye{
  font-size:9.5px;letter-spacing:0.32em;text-transform:uppercase;color:var(--ink-soft);
  margin-bottom:18px;
}
.sent-mark{
  width:62px;height:62px;border:1px solid var(--hair);border-radius:50%;
  display:grid;place-items:center;margin-bottom:28px;
}
.sent-mark svg{width:20px;height:20px;stroke:var(--ink);fill:none;stroke-width:1}
.sent-title{
  font-family:'Bodoni Moda',serif;font-style:italic;font-weight:400;
  font-size:56px;line-height:0.95;letter-spacing:-0.01em;
}
.sent-order{
  margin-top:18px;font-size:11px;letter-spacing:0.28em;text-transform:uppercase;color:var(--ink-soft);
}
.sent-msg{
  margin-top:32px;max-width:300px;
  font-family:'Bodoni Moda',serif;font-style:italic;font-size:17px;line-height:1.45;color:var(--ink);
  text-wrap:pretty;
}
.sent-msg .em{font-style:normal;font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--ink-faint);display:block;margin-top:14px}
.sent-again{
  margin-top:44px;background:transparent;border:none;cursor:pointer;color:var(--ink);
  font-size:10.5px;letter-spacing:0.3em;text-transform:uppercase;font-weight:500;
  padding:14px 26px;border-bottom:1px solid var(--ink);
}

/* ——— history sheet ——— */
.sheet{
  position:fixed;inset:0;z-index:50;
  display:flex;align-items:flex-end;justify-content:center;
  pointer-events:none;
}
.sheet-bg{
  position:absolute;inset:0;background:rgba(20,19,18,0.36);
  opacity:0;transition:opacity 320ms ease;
}
html[data-mode="night"] .sheet-bg{background:rgba(0,0,0,0.6)}
.sheet-panel{
  position:relative;width:100%;max-width:430px;
  background:var(--paper);
  border-top:1px solid var(--hair);
  padding:22px 26px 36px;
  transform:translateY(100%);
  transition:transform 420ms cubic-bezier(.22,.61,.36,1), background-color 700ms ease;
  max-height:80vh;overflow-y:auto;
}
.sheet.on{pointer-events:auto}
.sheet.on .sheet-bg{opacity:1}
.sheet.on .sheet-panel{transform:translateY(0)}
.sheet-grip{width:36px;height:3px;background:var(--hair-soft);border-radius:2px;margin:0 auto 18px}
.sheet h3{
  font-family:'Bodoni Moda',serif;font-style:italic;font-weight:400;
  font-size:32px;text-align:center;letter-spacing:-0.01em;
}
.sheet .sub{
  text-align:center;font-size:9.5px;letter-spacing:0.3em;text-transform:uppercase;
  color:var(--ink-faint);margin-top:6px;margin-bottom:22px;
}
.hist-empty{
  text-align:center;padding:30px 0 20px;
  font-family:'Bodoni Moda',serif;font-style:italic;color:var(--ink-soft);font-size:15px;
}
.hist-list{display:flex;flex-direction:column}
.hist-row{
  display:grid;grid-template-columns:1fr auto;gap:12px;align-items:baseline;
  padding:14px 0;border-top:1px solid var(--hair-soft);
}
.hist-row:last-child{border-bottom:1px solid var(--hair-soft)}
.hist-name{
  font-family:'Bodoni Moda',serif;font-style:italic;font-size:18px;color:var(--ink);line-height:1.1;
}
.hist-sub{
  font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--ink-faint);
  letter-spacing:0.04em;margin-top:3px;text-transform:uppercase;
}
.hist-date{
  font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--ink-soft);
  letter-spacing:0.04em;text-align:right;
  white-space:nowrap;
}
.hist-clear{
  display:block;margin:22px auto 0;background:transparent;border:none;cursor:pointer;
  font-size:10px;letter-spacing:0.28em;text-transform:uppercase;color:var(--ink-faint);
}

/* desktop: subtle frame */
@media(min-width:540px){
  body{background:#E9E6E0;padding:24px 0}
  html[data-mode="night"] body{background:#06060A}
  .app{
    box-shadow:0 1px 0 rgba(0,0,0,0.04), 0 30px 80px -20px rgba(0,0,0,0.25);
    background:var(--paper);
    border-radius:36px;
    overflow:hidden;
    min-height:880px;
    transition:background-color 700ms ease;
  }
}
</style>
</head>
<body>

<div class="app">

  <!-- top bar -->
  <div class="topbar">
    <button class="iconbtn" id="modeBtn" aria-label="Cambiar modo">
      <svg id="iconMode" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>

/* ——— chime sound ——— */
let _audioCtx;
function playChime(){
  try{
    if(!_audioCtx) _audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(_audioCtx.state==='suspended') _audioCtx.resume();
    const ctx=_audioCtx;
    const now=ctx.currentTime;
    // gentle 3-note arpeggio (E5, G5, B5)
    const notes=[{f:659.25,t:0},{f:783.99,t:0.13},{f:987.77,t:0.26}];
    notes.forEach(n=>{
      const o=ctx.createOscillator();
      const g=ctx.createGain();
      o.type='sine'; o.frequency.value=n.f;
      g.gain.setValueAtTime(0, now+n.t);
      g.gain.linearRampToValueAtTime(0.07, now+n.t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, now+n.t+1.4);
      o.connect(g).connect(ctx.destination);
      o.start(now+n.t); o.stop(now+n.t+1.5);
    });
  }catch(e){}
}

      parts.push(`
        <div class="opt-stack">
          <div class="opt-sublabel">Tamaño</div>
          <div class="size-row">
            <button class="sz-half" id="szS" onclick="selectOpt('chico')">Chico<span class="sub">~${d.cal.chico} kcal</span></button>
            <button class="sz-half" id="szL" onclick="selectOpt('grande')">Grande<span class="sub">~${d.cal.grande} kcal</span></button>
          </div>
        </div>`);
    } else {
      optLbl.textContent='Elige tamaño';
      parts.push(`
        <div class="size-row">
          <button class="sz-half" id="szS" onclick="selectOpt('chico')">Chico<span class="sub">~${d.cal.chico} kcal</span></button>
          <button class="sz-half" id="szL" onclick="selectOpt('grande')">Grande<span class="sub">~${d.cal.grande} kcal</span></button>
        </div>`);
    }
    container.innerHTML=parts.join('');
    document.getElementById('dcal').textContent=`Aproximadamente ${d.cal.chico}–${d.cal.grande} kcal · listo en ~${getPrep(d)} min`;
  } else if(d.variantes&&d.variantes.length>0){
    optLbl.textContent='Elige sabor';
    const col=document.createElement('div');
    col.className='opt-col';
    d.variantes.forEach(v=>{
      const btn=document.createElement('button');
      btn.className='sz';btn.textContent=v;
      btn.onclick=()=>{
        col.querySelectorAll('.sz').forEach(b=>b.classList.remove('on'));
        btn.classList.add('on');
        curSelection=v;
        checkEnable();
      };
      col.appendChild(btn);
    });
    container.appendChild(col);
    document.getElementById('dcal').textContent=`Aproximadamente ${d.cal} kcal · listo en ~${getPrep(d)} min`;
  } else {
    optWrap.style.display='none';
    curSelection=d.name;
    document.getElementById('dcal').textContent=`Aproximadamente ${d.cal} kcal · listo en ~${getPrep(d)} min`;
    checkEnable();
  }

  updateDetailStar();

  // show detail
  requestAnimationFrame(()=>detail.classList.add('on'));
  detail.scrollTop=0;
}

function updateTint(){
  const d=curDrink;
  if(!d){ setTint(''); return; }
  // resuelve temperatura efectiva
  const t = d.temp==='both' ? curTemp : d.temp;
  if(t==='hot') setTint('warm');
  else if(t==='cold') setTint('cool');
  else setTint('');
}
function updateTempLabel(){
  const d=curDrink;
  if(!d) return;
  const el=document.getElementById('dTempLbl');
  if(d.temp==='hot') el.textContent='Servido caliente';
  else if(d.temp==='cold') el.textContent='Servido helado';
  else if(d.temp==='both' && curTemp==='hot') el.textContent='Servido caliente';
  else if(d.temp==='both' && curTemp==='cold') el.textContent='Servido helado';
  else el.textContent='Caliente o helado';
}

function selectTemp(t){
  curTemp=t;
  document.querySelectorAll('#optContainer .opt-stack:first-child .sz-half').forEach(b=>b.classList.remove('on'));
  document.getElementById(t==='hot'?'tHot':'tCold').classList.add('on');
  updateTint();
  updateTempLabel();
  checkEnable();
}

function selectOpt(s){
  curSelection=s;
  // size-row puede ser el único o el segundo bloque; afecta solo a chico/grande
  document.querySelectorAll('#szS, #szL').forEach(b=>b && b.classList.remove('on'));
  const el=document.getElementById(s==='chico'?'szS':'szL');
  if(el) el.classList.add('on');
  checkEnable();
}

function goHome(){
  document.getElementById('detail').classList.remove('on');
  setTint('');
}

async function sendOrder(){
  const btn=document.getElementById('orderBtn');
  btn.disabled=true;
  btn.textContent='Enviando…';
  const d=curDrink;
  const notes = (document.getElementById('notesInput').value||'').trim();
  const prep = getPrep(d);

  // resolved temp (for messaging + history)
  const t = d.temp==='both' ? curTemp : d.temp;
  const tempWord = t==='hot' ? 'caliente' : t==='cold' ? 'helado' : '';
  const emoji = t==='cold' ? '🥤' : '☕';

  let label, sub, kcalText;
  if(d.type==='cafe'){
    label = buildLabel();
    kcalText = `~${d.cal[curSelection]} kcal`;
    sub = kcalText;
  } else if(d.variantes && d.variantes.length>0){
    label = buildLabel();
    kcalText = `~${d.cal} kcal`;
    sub = kcalText;
  } else {
    label = d.name;
    kcalText = `~${d.cal} kcal`;
    sub = kcalText;
  }

  // Discord message
  let msg = `${emoji} **Maison Jenn**\n`;
  msg += `Jenn quiere **${label}** _(${kcalText})_`;
  if(notes) msg += `\n✍️ _“${notes}”_`;
  msg += `\n⏱️ Listo en ~${prep} min`;

  try{
    await fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:msg})});
  }catch(e){ /* silent */ }

  // save to history (richer shape)
  saveHistory({
    id: d.id,
    label, sub,
    temp: d.temp==='both' ? curTemp : null,
    size: d.type==='cafe' ? curSelection : null,
    variant: (d.variantes && d.variantes.length>0) ? curSelection : null,
    notes,
    prep,
    ts: Date.now()
  });

  // chime
  playChime();

  // tender note
  const note = lovenotes[Math.floor(Math.random()*lovenotes.length)];
  document.getElementById('sentOrder').textContent = label;
  document.getElementById('sentPrep').textContent = `Listo en ~${prep} min`;
  document.getElementById('sentMsg').innerHTML = `“${note}”<span class="em">— con amor</span>`;

  // transition
  document.getElementById('detail').classList.remove('on');
  setTimeout(()=>document.getElementById('sent').classList.add('on'), 220);
}

function reset(){
  document.getElementById('sent').classList.remove('on');
  setTint('');
  document.getElementById('orderBtn').textContent='Enviar pedido';
  // back to home (detail already closed)
}

/* ——— history ——— */
function saveHistory(entry){
  const list=JSON.parse(localStorage.getItem('mj_history')||'[]');
  list.unshift(entry);
  localStorage.setItem('mj_history', JSON.stringify(list.slice(0,20)));
}
function openSheet(){
  renderHistory();
  document.getElementById('sheet').classList.add('on');
}
function closeSheet(){
  document.getElementById('sheet').classList.remove('on');
}
function renderHistory(){
  const list=JSON.parse(localStorage.getItem('mj_history')||'[]');
  const body=document.getElementById('histBody');
  if(!list.length){
    body.innerHTML=`<div class="hist-empty">Aún sin pedidos.<br/>El primero será memorable.</div>`;
    return;
  }
  body.innerHTML=`<div class="hist-list">${list.map((e,i)=>{
    const d=new Date(e.ts);
    const days=['dom','lun','mar','mié','jue','vie','sáb'];
    const hh=String(d.getHours()).padStart(2,'0');
    const mm=String(d.getMinutes()).padStart(2,'0');
    const notesHtml = e.notes ? `<div class="hist-notes">“${escapeHtml(e.notes)}”</div>` : '';
    return `<div class="hist-row">
      <div>
        <div class="hist-name">${e.label}</div>
        <div class="hist-sub">${e.sub}</div>
        ${notesHtml}
      </div>
      <div class="hist-actions">
        <div class="hist-date">${days[d.getDay()]} · ${hh}:${mm}</div>
        <button class="hist-reorder" onclick="reorder(${i})">Pedir igual</button>
      </div>
    </div>`;
  }).join('')}</div>
  <button class="hist-clear" onclick="clearHistory()">Borrar historial</button>`;
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function reorder(idx){
  const list=JSON.parse(localStorage.getItem('mj_history')||'[]');
  const entry=list[idx];
  if(!entry) return;
  const drink=allDrinks().find(d=>d.id===entry.id);
  if(!drink) return;
  closeSheet();
  const src=document.getElementById('histBtn');
  setTimeout(()=>{
    openDetail(drink, src);
    setTimeout(()=>{
      if(drink.type==='cafe'){
        if(drink.temp==='both' && entry.temp) selectTemp(entry.temp);
        if(entry.size) selectOpt(entry.size);
      } else if(drink.variantes && entry.variant){
        document.querySelectorAll('#optContainer .sz').forEach(b=>{
          if(b.textContent===entry.variant){ b.classList.add('on'); curSelection=entry.variant; checkEnable(); }
        });
      }
      if(entry.notes) document.getElementById('notesInput').value=entry.notes;
    }, 80);
  }, 320);
}
function clearHistory(){
  if(confirm('¿Borrar el historial?')){
    localStorage.removeItem('mj_history');
    renderHistory();
  }
}

init();
</script>
