<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Maison Jenn</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:430px;margin:0 auto;min-height:100vh}
.header{padding:2rem 1.5rem 1rem;text-align:center;border-bottom:0.5px solid #e5e5e5}
.brand{font-size:10px;letter-spacing:0.25em;color:#999;text-transform:uppercase;margin-bottom:6px}
.title{font-size:30px;font-weight:500;color:#111;letter-spacing:-0.03em;font-family:Georgia,serif}
.tagline{font-size:12px;color:#aaa;margin-top:4px;letter-spacing:0.05em}
.cats{display:flex;gap:8px;padding:1rem 1.5rem 0.5rem;overflow-x:auto}
.cats::-webkit-scrollbar{display:none}
.tb{flex:0 0 auto;padding:9px 14px;border:0.5px solid #ccc;border-radius:8px;background:transparent;color:#666;font-size:12px;cursor:pointer;letter-spacing:0.03em;white-space:nowrap}
.tb.on{background:#111;color:#fff;border-color:#111}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1px;background:#e5e5e5;margin:0.75rem 1.5rem 2rem}
.card{background:#fff;padding:1.25rem 1rem 1rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px}
.card:active{background:#f5f5f5}
.ill{width:72px;height:72px;color:#111}
.cname{font-size:13px;color:#111;text-align:center;line-height:1.3}
.ccal{font-size:11px;color:#aaa;text-align:center}
.overlay{background:#fff;min-height:100vh;display:none;flex-direction:column}
.back{display:flex;align-items:center;gap:8px;padding:1.25rem 1.5rem 0;cursor:pointer;color:#666;font-size:13px;border:none;background:transparent}
.detail{display:flex;flex-direction:column;align-items:center;padding:1.5rem 2rem 1rem;text-align:center}
.big-ill{width:110px;height:110px;margin-bottom:1rem;color:#111}
.dname{font-size:22px;font-weight:500;color:#111;font-family:Georgia,serif;letter-spacing:-0.02em}
.dcal{font-size:12px;color:#aaa;margin-top:4px;margin-bottom:1rem}
.ddesc{font-size:13px;color:#666;line-height:1.6;margin-bottom:1.5rem}
.size-label{font-size:10px;letter-spacing:0.15em;color:#aaa;text-transform:uppercase;margin-bottom:10px}
.opt-row{display:flex;flex-direction:column;gap:8px;width:100%}
.sz{width:100%;padding:12px 0;border:0.5px solid #ccc;border-radius:8px;background:transparent;color:#666;font-size:13px;cursor:pointer}
.sz.on{background:#111;color:#fff;border-color:#111}
.size-row{display:flex;gap:10px;width:100%}
.sz-half{flex:1;padding:12px 0;border:0.5px solid #ccc;border-radius:8px;background:transparent;color:#666;font-size:13px;cursor:pointer}
.sz-half.on{background:#111;color:#fff;border-color:#111}
.order-btn{width:100%;padding:14px;background:#111;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;margin-top:1.5rem}
.order-btn:disabled{opacity:0.3;cursor:default}
.sent{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center}
.sent-ring{width:60px;height:60px;border-radius:50%;border:0.5px solid #ccc;display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem;font-size:22px}
.sent-title{font-size:22px;font-weight:500;font-family:Georgia,serif;color:#111;margin-bottom:6px}
.sent-sub{font-size:13px;color:#666;line-height:1.6;margin-bottom:2rem}
.again{background:transparent;border:0.5px solid #ccc;color:#666;padding:11px 2rem;border-radius:8px;font-size:13px;cursor:pointer}
</style>
</head>
<body>

<div id="home">
  <div class="header">
    <div class="brand">café · xalapa</div>
    <div class="title">Maison Jenn</div>
    <div class="tagline">¿Qué te preparo hoy?</div>
  </div>
  <div class="cats">
    <button class="tb on" onclick="setCat('all',this)">Todas</button>
    <button class="tb" onclick="setCat('hot',this)">Bebidas calientes</button>
    <button class="tb" onclick="setCat('cold',this)">Bebidas frías</button>
    <button class="tb" onclick="setCat('otras',this)">Otras bebidas</button>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="detail">
  <button class="back" onclick="goHome()">&#8592; Menú</button>
  <div class="detail">
    <div id="bigIll" class="big-ill"></div>
    <div class="dname" id="dname"></div>
    <div class="dcal" id="dcal"></div>
    <div class="ddesc" id="ddesc"></div>
    <div class="size-label" id="optLabel">Tamaño</div>
    <div id="optContainer"></div>
    <button class="order-btn" id="orderBtn" onclick="sendOrder()" disabled>Enviar pedido</button>
  </div>
</div>

<div class="sent" id="sent">
  <div class="sent-ring">✓</div>
  <div class="sent-title">En camino</div>
  <div class="sent-sub" id="sentMsg"></div>
  <button class="again" onclick="reset()">Pedir de nuevo</button>
</div>

<script>
const WEBHOOK='https://discord.com/api/webhooks/1509444128956747856/nRYmmbCFqK8aPN28Lz8fsNLYRCUc8PxI5jEyyrySaV-nhR3lgmzNAshw5sesttZzIArk';

const cafe=[
  {id:'americano',name:'Americano',temp:'both',cal:{chico:15,grande:20},desc:'Espresso con agua caliente o fría. Suave y largo.',icon:'americano',type:'cafe'},
  {id:'latte',name:'Latte',temp:'both',cal:{chico:120,grande:190},desc:'Espresso con leche vaporizada. Cremoso y suave.',icon:'latte',type:'cafe'},
  {id:'capuchino',name:'Capuchino',temp:'both',cal:{chico:80,grande:120},desc:'Espresso, leche vaporizada y espuma densa.',icon:'capuchino',type:'cafe'},
  {id:'flatwhite',name:'Flat white',temp:'hot',cal:{chico:100,grande:150},desc:'Doble espresso con microespuma sedosa. Intenso.',icon:'latte',type:'cafe'},
  {id:'espresso',name:'Espresso',temp:'hot',cal:{chico:5,grande:10},desc:'Chico: sencillo. Grande: doble. Puro y concentrado.',icon:'espresso',type:'cafe'},
  {id:'matchate',name:'Matcha té',temp:'both',cal:{chico:5,grande:8},desc:'Matcha puro disuelto. Terroso y limpio.',icon:'matchate',type:'cafe'},
  {id:'matchalatte',name:'Matcha latte',temp:'both',cal:{chico:130,grande:200},desc:'Matcha con leche vaporizada. Suave y herbal.',icon:'matchalatte',type:'cafe'},
  {id:'matchapresso',name:'Matcha presso',temp:'cold',cal:{chico:140,grande:210},desc:'Matcha frío con leche. Refrescante y cremoso.',icon:'matchalatte',type:'cafe'},
  {id:'matchatonic',name:'Matcha tonic',temp:'cold',cal:{chico:60,grande:90},desc:'Matcha sobre agua tónica con hielo. Vibrante.',icon:'tonic',type:'cafe'},
  {id:'espressotonic',name:'Espresso tonic',temp:'cold',cal:{chico:55,grande:80},desc:'Espresso sobre tónica y hielo. Amargo y burbujeante.',icon:'tonic',type:'cafe'},
  {id:'cloudmatcha',name:'Cloud matcha',temp:'cold',cal:{chico:90,grande:140},desc:'Matcha con espuma de leche fría encima. Suave.',icon:'cloud',type:'cafe'},
  {id:'cloudespresso',name:'Cloud espresso',temp:'cold',cal:{chico:85,grande:130},desc:'Espresso con nube de leche fría. Contrastante.',icon:'cloud',type:'cafe'},
  {id:'dirtymatcha',name:'Dirty matcha',temp:'both',cal:{chico:150,grande:220},desc:'Matcha con shot de espresso. Lo mejor de dos mundos.',icon:'dirty',type:'cafe'},
];

const otras=[
  {id:'aguatonica',name:'Agua tónica',temp:'cold',cal:40,desc:'Burbujeante y ligeramente amarga. Refrescante.',icon:'tonic',type:'otra',variantes:null},
  {id:'aguacoco',name:'Agua de coco',temp:'cold',cal:45,desc:'Natural y dulce. Hidratante.',icon:'coco',type:'otra',variantes:null},
  {id:'arizona',name:'Arizona',temp:'cold',cal:70,desc:'Clásico americano. Suave y dulce.',icon:'can',type:'otra',variantes:['Té verde']},
  {id:'lipton',name:'Lipton',temp:'cold',cal:35,desc:'Ligero y refrescante.',icon:'can',type:'otra',variantes:['Té negro','Limón','Durazno']},
];

const svgs={
  espresso:`<svg viewBox="0 0 72 72" fill="none"><rect x="22" y="28" width="28" height="22" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M50 34 Q58 34 58 40 Q58 46 50 46" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="16" y1="50" x2="56" y2="50" stroke="currentColor" stroke-width="1.5"/><path d="M30 28 Q33 22 36 24 Q39 22 42 28" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>`,
  americano:`<svg viewBox="0 0 72 72" fill="none"><path d="M20 24 L24 54 Q24 56 26 56 L46 56 Q48 56 48 54 L52 24 Z" stroke="currentColor" stroke-width="1.5"/><line x1="16" y1="56" x2="56" y2="56" stroke="currentColor" stroke-width="1.5"/><line x1="20" y1="24" x2="52" y2="24" stroke="currentColor" stroke-width="1.5"/><line x1="26" y1="34" x2="30" y2="34" stroke="currentColor" stroke-width="1.5"/><line x1="26" y1="40" x2="30" y2="40" stroke="currentColor" stroke-width="1.5"/><line x1="26" y1="46" x2="30" y2="46" stroke="currentColor" stroke-width="1.5"/></svg>`,
  latte:`<svg viewBox="0 0 72 72" fill="none"><path d="M20 22 L24 56 Q24 58 26 58 L46 58 Q48 58 48 56 L52 22 Z" stroke="currentColor" stroke-width="1.5"/><line x1="20" y1="22" x2="52" y2="22" stroke="currentColor" stroke-width="1.5"/><path d="M52 32 Q60 32 60 39 Q60 46 52 46" stroke="currentColor" stroke-width="1.5" fill="none"/><ellipse cx="36" cy="32" rx="12" ry="4" stroke="currentColor" stroke-width="1.5"/></svg>`,
  capuchino:`<svg viewBox="0 0 72 72" fill="none"><rect x="20" y="30" width="32" height="24" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M52 36 Q60 36 60 42 Q60 48 52 48" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="16" y1="54" x2="56" y2="54" stroke="currentColor" stroke-width="1.5"/><path d="M20 30 Q36 20 52 30" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>`,
  matchate:`<svg viewBox="0 0 72 72" fill="none"><path d="M22 26 L26 54 Q26 56 28 56 L44 56 Q46 56 46 54 L50 26 Z" stroke="currentColor" stroke-width="1.5"/><line x1="22" y1="26" x2="50" y2="26" stroke="currentColor" stroke-width="1.5"/><path d="M50 32 Q56 32 56 38 Q56 44 50 44" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M30 20 Q36 14 42 20" stroke="currentColor" stroke-width="1.5" fill="none"/><circle cx="36" cy="12" r="2" stroke="currentColor" stroke-width="1.5"/></svg>`,
  matchalatte:`<svg viewBox="0 0 72 72" fill="none"><path d="M18 22 L22 58 Q22 60 24 60 L48 60 Q50 60 50 58 L54 22 Z" stroke="currentColor" stroke-width="1.5"/><line x1="18" y1="22" x2="54" y2="22" stroke="currentColor" stroke-width="1.5"/><path d="M54 32 Q62 32 62 39 Q62 46 54 46" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M26 32 Q36 26 46 32 Q36 38 26 32Z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>`,
  tonic:`<svg viewBox="0 0 72 72" fill="none"><path d="M20 20 L24 58 Q24 60 26 60 L46 60 Q48 60 48 58 L52 20 Z" stroke="currentColor" stroke-width="1.5"/><line x1="20" y1="20" x2="52" y2="20" stroke="currentColor" stroke-width="1.5"/><circle cx="30" cy="38" r="2" stroke="currentColor" stroke-width="1.2"/><circle cx="42" cy="32" r="1.5" stroke="currentColor" stroke-width="1.2"/><circle cx="36" cy="46" r="1.5" stroke="currentColor" stroke-width="1.2"/><line x1="34" y1="14" x2="34" y2="20" stroke="currentColor" stroke-width="1.5"/><line x1="38" y1="14" x2="38" y2="20" stroke="currentColor" stroke-width="1.5"/></svg>`,
  cloud:`<svg viewBox="0 0 72 72" fill="none"><path d="M20 32 L24 58 Q24 60 26 60 L46 60 Q48 60 48 58 L52 32 Z" stroke="currentColor" stroke-width="1.5"/><line x1="20" y1="32" x2="52" y2="32" stroke="currentColor" stroke-width="1.5"/><path d="M24 32 Q26 20 30 20 Q32 14 36 16 Q40 12 44 18 Q48 18 50 24 Q54 26 52 32" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>`,
  dirty:`<svg viewBox="0 0 72 72" fill="none"><path d="M18 24 L22 58 Q22 60 24 60 L48 60 Q50 60 50 58 L54 24 Z" stroke="currentColor" stroke-width="1.5"/><line x1="18" y1="24" x2="54" y2="24" stroke="currentColor" stroke-width="1.5"/><path d="M54 34 Q62 34 62 41 Q62 48 54 48" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="28" y="16" width="16" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><line x1="32" y1="16" x2="32" y2="12" stroke="currentColor" stroke-width="1.5"/><line x1="40" y1="16" x2="40" y2="12" stroke="currentColor" stroke-width="1.5"/></svg>`,
  coco:`<svg viewBox="0 0 72 72" fill="none"><path d="M22 28 L26 58 Q26 60 28 60 L44 60 Q46 60 46 58 L50 28 Z" stroke="currentColor" stroke-width="1.5"/><line x1="22" y1="28" x2="50" y2="28" stroke="currentColor" stroke-width="1.5"/><path d="M36 28 L36 18 Q42 14 46 16" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M36 18 Q30 12 24 16" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>`,
  can:`<svg viewBox="0 0 72 72" fill="none"><rect x="24" y="20" width="24" height="38" rx="4" stroke="currentColor" stroke-width="1.5"/><ellipse cx="36" cy="20" rx="12" ry="3" stroke="currentColor" stroke-width="1.5"/><ellipse cx="36" cy="58" rx="12" ry="3" stroke="currentColor" stroke-width="1.5"/><line x1="34" y1="14" x2="34" y2="20" stroke="currentColor" stroke-width="1.5"/><path d="M34 14 Q36 12 38 14" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="24" y1="32" x2="48" y2="32" stroke="currentColor" stroke-width="1" stroke-dasharray="2 2"/></svg>`,
};

let curCat='all',curDrink=null,curSelection=null;

function setCat(cat,el){
  curCat=cat;
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  renderGrid();
}

function renderGrid(){
  const g=document.getElementById('grid');
  g.innerHTML='';
  let list=[];
  if(curCat==='all') list=[...cafe,...otras];
  else if(curCat==='hot') list=cafe.filter(d=>d.temp==='hot'||d.temp==='both');
  else if(curCat==='cold') list=[...cafe.filter(d=>d.temp==='cold'||d.temp==='both'),...otras];
  else if(curCat==='otras') list=otras;
  list.forEach(d=>{
    const c=document.createElement('div');
    c.className='card';
    const calTxt=d.type==='otra'?`~${d.cal} kcal`:`~${d.cal.chico}–${d.cal.grande} kcal`;
    c.innerHTML=`<div class="ill">${svgs[d.icon]||svgs.latte}</div><div class="cname">${d.name}</div><div class="ccal">${calTxt}</div>`;
    c.onclick=()=>openDetail(d);
    g.appendChild(c);
  });
}

function openDetail(d){
  curDrink=d;curSelection=null;
  document.getElementById('bigIll').innerHTML=svgs[d.icon]||svgs.latte;
  document.getElementById('dname').textContent=d.name;
  document.getElementById('ddesc').textContent=d.desc;
  document.getElementById('orderBtn').disabled=true;
  document.getElementById('optLabel').style.display='';
  const container=document.getElementById('optContainer');
  container.innerHTML='';
  if(d.type==='cafe'){
    document.getElementById('optLabel').textContent='Tamaño';
    container.innerHTML=`<div class="size-row"><button class="sz-half" id="szS" onclick="selectOpt('chico')">Chico</button><button class="sz-half" id="szL" onclick="selectOpt('grande')">Grande</button></div>`;
    document.getElementById('dcal').textContent=`~${d.cal.chico} kcal · pequeño`;
  } else if(d.variantes&&d.variantes.length>0){
    document.getElementById('optLabel').textContent='Sabor';
    const row=document.createElement('div');
    row.className='opt-row';
    d.variantes.forEach(v=>{
      const btn=document.createElement('button');
      btn.className='sz';
      btn.textContent=v;
      btn.onclick=()=>{
        document.querySelectorAll('#optContainer .sz').forEach(b=>b.classList.remove('on'));
        btn.classList.add('on');
        curSelection=v;
        document.getElementById('orderBtn').disabled=false;
      };
      row.appendChild(btn);
    });
    container.appendChild(row);
    document.getElementById('dcal').textContent=`~${d.cal} kcal`;
  } else {
    document.getElementById('optLabel').style.display='none';
    curSelection=d.name;
    document.getElementById('orderBtn').disabled=false;
    document.getElementById('dcal').textContent=`~${d.cal} kcal`;
  }
  document.getElementById('home').style.display='none';
  document.getElementById('detail').style.display='flex';
}

function selectOpt(s){
  curSelection=s;
  document.querySelectorAll('.sz-half').forEach(b=>b.classList.remove('on'));
  document.getElementById(s==='chico'?'szS':'szL').classList.add('on');
  document.getElementById('orderBtn').disabled=false;
  document.getElementById('dcal').textContent=`~${curDrink.cal[s]} kcal · ${s==='chico'?'pequeño':'regular'}`;
}

async function sendOrder(){
  const btn=document.getElementById('orderBtn');
  btn.disabled=true;
  btn.textContent='Enviando...';
  let msg,label;
  if(curDrink.type==='cafe'){
    msg=`☕ **Maison Jenn**\nJenn quiere un **${curDrink.name}** ${curSelection} (~${curDrink.cal[curSelection]} kcal)`;
    label=`${curDrink.name} ${curSelection}`;
  } else if(curDrink.variantes&&curDrink.variantes.length>0){
    msg=`🥤 **Maison Jenn**\nJenn quiere un **${curDrink.name} ${curSelection}** (~${curDrink.cal} kcal)`;
    label=`${curDrink.name} ${curSelection}`;
  } else {
    msg=`🥤 **Maison Jenn**\nJenn quiere **${curDrink.name}** (~${curDrink.cal} kcal)`;
    label=curDrink.name;
  }
  try{
    await fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:msg})});
  }catch(e){}
  document.getElementById('sentMsg').textContent=`${label} está en camino.`;
  document.getElementById('detail').style.display='none';
  document.getElementById('sent').style.display='flex';
}

function goHome(){
  document.getElementById('detail').style.display='none';
  document.getElementById('home').style.display='block';
}

function reset(){
  document.getElementById('sent').style.display='none';
  document.getElementById('home').style.display='block';
  renderGrid();
}

renderGrid();
</script>
</body>
</html>
